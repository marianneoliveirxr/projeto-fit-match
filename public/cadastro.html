<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/cadastro.css">
</head>
<body>
    <div class="conteudo">
    <div class="logo">
            <img src="assets/img/fitmatch.png" alt="FitMatch Logo">
            <p class="logo-titulo">MONTE SEU PERFIL DE TREINO</p>
        </div>
        
        <div class="cadastro-container">
            <div class="card-cadastro">

                <div class="principalText">
                    <h1>Criar conta</h1>
                    <p class="descricao">Preencha seus dados para receber seu plano personalizado</p>
                </div>

                <div id="formCadastro">

                    <p class="titulo">DADOS PESSOAIS</p>

                    <div class="campo">
                        <label for="nome">NOME COMPLETO</label>
                        <input class="ipt" id="ipt_nome" name="nome" type="text" placeholder="Seu nome">
                        <p id="erroNome" class="erro"></p>
                    </div>

                    <div class="campo">
                        <label for="email">E-MAIL</label>
                        <input class="ipt" id="ipt_email" name="email" type="email" placeholder="seu@email.com">
                        <p id="erroEmail" class="erro"></p>
                    </div>

                    <div class="campo">
                        <label for="senha">Senha</label>
                        <input id="ipt_senha" type="password" placeholder="••••••">
                        <p id="erroSenha" class="erro"></p>
                    </div>

                    <div class="campo">
                        <label for="confirmarSenha">Confirmar senha</label>
                        <input id="ipt_confirmar" name="confirmarSenha" type="password" placeholder="••••••">
                        <p id="erroConfirmar" class="erro"></p>
                    </div>
                    <button class="btn-primary" onclick="cadastrar()">CRIAR MEU PLANO →</button>
                    <div class="links">
                        <a href="index.html">Voltar ao início</a>
                        <p>Já tem conta? <a href="login.html">Entrar</a></p>
                    </div>

                    </div>
                    <div id="mensagem_erro"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
<script>
function cadastrar(){

    var nomeVar = ipt_nome.value;
    var emailVar = ipt_email.value;
    var senhaVar = ipt_senha.value;
    var confirmarVar = ipt_confirmar.value;

    let valido = true;

    erroNome.innerHTML = "";
    erroEmail.innerHTML = "";
    erroSenha.innerHTML = "";
    erroConfirmar.innerHTML = "";
    
    if (nomeVar.length < 3) {
        erroNome.innerText = "Digite um nome válido";
        valido = false;
    }

    
    if (!emailVar.includes("@") || !emailVar.includes(".com")) {
        erroEmail.innerText = "Email inválido";
        valido = false;
    } else {
        let partes = emailVar.split("@");

        if (partes[0].length < 3) {
            erroEmail.innerHTML = "Poucos caracteres antes do @";
            valido = false;
        }

        if (partes[1].length < 4) {
            erroEmail.innerHTML = "Domínio inválido";
            valido = false;
        }
    }

    if (senhaVar.length < 4) {
        erroSenha.innerHTML = "Senha muito curta";
        valido = false;
    }

    
    else if (!senhaVar.includes("!") && !senhaVar.includes("@") && !senhaVar.includes("#") && !senhaVar.includes("$")) 
    {
        erroSenha.innerHTML = "Use um caractere especial (! @ # $)";
        valido = false;
    }

    else if (senhaVar != confirmarVar) {
        erroConfirmar.innerHTML = "Senhas não coincidem";
        valido = false;
    }

    if (valido){
      //Recupere o valor da nova input pelo nome do id
      // Agora vá para o método fetch logo abaixo

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrarCompleto", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            nomeServer: nomeVar,
            emailServer: emailVar,
            senhaServer: senhaVar,
            confirmarServer: confirmarVar
        })
    })
    .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
            alert("Cadastro realizado com sucesso!");
        } else {
            throw ("Erro no cadastro");
        }
    })
    .catch(function (erro) {
        console.log(erro);
    });

    // return false;
}
}

</script>
