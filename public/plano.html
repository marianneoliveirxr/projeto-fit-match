<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="../assets/img/icone.png" type="image/x-icon">
    <link rel="stylesheet" href="css/plano.css" />
    <title>Criar plano</title>
  </head>
  <body>
    <div class="conteudo">
      <div class="logo">
        <img src="assets/img/fitmatch.png" alt="FitMatch Logo" />
        <p class="logo-titulo">MONTE SEU PERFIL DE TREINO</p>
      </div>
      <div class="plano-container">
        <div class="card-plano">
          <div class="principalText">
            <h1>PERFIL DE TREINO</h1>
            <p class="descricao">
              Preencha seus dados para receber seu plano personalizado
            </p>
          </div>

          <div class="peso-altura">
            <div class="campo">
              <label for="peso">PESO (KG)</label>
              <input id="ipt_peso" type="number" placeholder="70" />
              <p id="erroPeso" class="erro"></p>
            </div>

            <div class="campo">
              <label for="altura">ALTURA (CM)</label>
              <input id="ipt_altura" type="number" placeholder="170" />
              <p id="erroAltura" class="erro"></p>
            </div>
          </div>

          <div class="campo-label">
            <p class="titulo-campo">Qual o seu objetivo principal?</p>
            <select class="option" id="objetivo">
              <option value=""></option>
              <option value="emagrecer">Emagrecer</option>
              <option value="hipertrofia">Ganhar Massa Muscular</option>
            </select>
            <p id="erroObjetivo" class="erro"></p>
          </div>

          <div class="campo-label">
            <p class="titulo-campo">Há quanto tempo você realiza exercício físico?</p>
            <select class="option" id="tempo">
              <option value=""></option>
              <option value="iniciante">Menos de 6 meses</option>
              <option value="intermediario">Entre 6 meses e 2 anos</option>
              <option value="avancado">Mais de 2 anos</option>
            </select>
            <p id="erroTempo" class="erro"></p>
          </div>

          <div class="campo-label">
            <p class="titulo-campo">Qual o seu sexo biológico?</p>
            <select class="option" id="sexo">
              <option value=""></option>
              <option value="feminino">Feminino</option>
              <option value="masculino">Masculino</option>
            </select>
            <p id="erroSexo" class="erro"></p>
          </div>

          <button type="submit" class="btn-primary" onclick="criarPlano()">
            CRIAR MEU PLANO →
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
<script>
  let perfilId = 0;

  function limparFormulario() {
    ipt_peso.value = "";
    ipt_altura.value = "";
    objetivo.value = "";
    tempo.value = "";
    sexo.value = "";
  }

  function criarPlano() {
    erroPeso.innerHTML = "";
    erroAltura.innerHTML = "";
    erroObjetivo.innerHTML = "";
    erroTempo.innerHTML = "";
    erroSexo.innerHTML = "";

    let valido = true;

    let pesoVar = Number(ipt_peso.value);
    let alturaVar = Number(ipt_altura.value);

    let selectObjetivo = document.getElementById("objetivo");
    let objetivoVar = selectObjetivo.value;

    let selectTempo = document.getElementById("tempo");
    let tempoVar = selectTempo.value;

    let selectSexo = document.getElementById("sexo");
    let sexoVar = selectSexo.value;

    if (pesoVar == "") {
      erroPeso.innerHTML = "Informe um valor";
      valido = false;
    } else if (pesoVar <= 0 || pesoVar < 40 || pesoVar > 150) {
      erroPeso.innerHTML = "Informe um peso válido";
      valido = false;
    }

    if (alturaVar == "") {
      erroAltura.innerHTML = "Informe um valor";
      valido = false;
    } else if (alturaVar < 140 || alturaVar > 210) {
      erroAltura.innerHTML = "Informe uma altura válida";
      valido = false;
    }

    if (objetivoVar == "") {
      erroObjetivo.innerHTML = "Selecione uma opção";
      valido = false;
    }

    if (tempoVar == "") {
      erroTempo.innerHTML = "Selecione uma opção";
      valido = false;
    }

    if (sexoVar == "") {
      erroSexo.innerHTML = "Selecione uma opção";
      valido = false;
    }

    if (valido) {
      if (objetivoVar == "emagrecer" && tempoVar == "iniciante" && sexoVar == "masculino") {
        perfilId = 1;
      } else if (objetivoVar == "emagrecer" && tempoVar == "intermediario" && sexoVar == "masculino") {
        perfilId = 2;
      } else if (objetivoVar == "emagrecer" && tempoVar == "avancado" && sexoVar == "masculino") {
        perfilId = 3;
      } else if (objetivoVar == "hipertrofia" && tempoVar == "iniciante" && sexoVar == "masculino") {
        perfilId = 4;
      } else if (objetivoVar == "hipertrofia" && tempoVar == "intermediario" && sexoVar == "masculino") {
        perfilId = 5;
      } else if (objetivoVar == "hipertrofia" && tempoVar == "avancado" && sexoVar == "masculino") {
        perfilId = 6;
      } else if (objetivoVar == "emagrecer" && tempoVar == "iniciante" && sexoVar == "feminino") {
        perfilId = 7;
      } else if (objetivoVar == "emagrecer" && tempoVar == "intermediario" && sexoVar == "feminino") {
        perfilId = 8;
      } else if (objetivoVar == "emagrecer" && tempoVar == "avancado" && sexoVar == "feminino") {
        perfilId = 9;
      } else if (objetivoVar == "hipertrofia" && tempoVar == "iniciante" && sexoVar == "feminino") {
        perfilId = 10;
      } else if (objetivoVar == "hipertrofia" && tempoVar == "intermediario" && sexoVar == "feminino") {
        perfilId = 11;
      } else if (objetivoVar == "hipertrofia" && tempoVar == "avancado" && sexoVar == "feminino") {
        perfilId = 12;
      }

      fetch("/perfil/adicionarPerfil", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          usuarioServer: sessionStorage.ID_USUARIO,
          perfilServer: perfilId,
          pesoServer: pesoVar,
          alturaServer: alturaVar
        }),
      })
        .then(function (resposta) {
          console.log("ESTOU NO THEN DO criarPlano()!");

          if (resposta.ok) {
            console.log(resposta);
            limparFormulario();

            setTimeout(function () {
              window.location.href = "/dashboard/";
            }, 3000);
          } else {
            console.log("Houve um erro ao tentar criar o plano!");
          }
        })
        .catch(function (erro) {
          console.log(erro);
        });
    }
  }
</script>
